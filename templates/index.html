<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Калькулятор дефицита</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    h2 {
      margin-top: 0;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 100%;
    }

    button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #2f66ea;
      color: white;
    }

    .secondary {
      background: #eee;
    }

    .result {
      display: none;
    }

    .result.active {
      display: block;
    }

    .status.good { background: #e8f8ef; }
    .status.mid { background: #fff7e5; }
    .status.bad { background: #ffeaea; }
  </style>
</head>

<body>
<div class="container">

  <div class="card">
    <h2>Цель</h2>

    <div class="row">
      <label>Тип цели</label>
      <div>
        <input type="radio" name="goalType" id="goalWeight" checked> Вес
        <input type="radio" name="goalType" id="goalFat"> Жир
      </div>
    </div>

    <div id="weightRow">
      <input id="targetWeight" type="number" placeholder="Целевой вес"/>
    </div>

    <div id="fatBlock" hidden>
      <input id="currentFat" type="number" placeholder="Текущий % жира"/>
      <input id="targetFat" type="number" placeholder="Целевой % жира"/>
    </div>
  </div>

  <div class="card">
    <h2>Данные</h2>

    <div class="row">
      <input id="weight" type="number" placeholder="Вес"/>
      <input id="height" type="number" placeholder="Рост"/>
    </div>

    <div class="row">
      <input id="age" type="number" placeholder="Возраст"/>
      <input id="steps" type="number" placeholder="Шаги"/>
    </div>

    <div class="row">
      <input id="workouts" type="number" placeholder="Тренировки"/>
      <input id="minutesPerWorkout" type="number" placeholder="Минут"/>
    </div>
  </div>

  <div class="card">
    <h2>Питание</h2>

    <div class="row">
      <input id="proteinWeek" type="number" placeholder="Белки"/>
      <input id="fatWeek" type="number" placeholder="Жиры"/>
      <input id="carbsWeek" type="number" placeholder="Углеводы"/>
    </div>

    <input id="caloriesDay" type="number" placeholder="Ккал в день"/>
  </div>

  <div class="card">
    <button id="calculateBtn" class="primary">Рассчитать</button>
    <button id="clearBtn" class="secondary">Очистить</button>
  </div>

  <div id="result" class="card result">
    <h2>Результат</h2>

    <p>Цель: <span id="resultGoal">-</span></p>
    <p>BMR: <span id="resultBmr">-</span></p>
    <p>TDEE: <span id="resultTdee">-</span></p>

    <div id="statusCard" class="status">
      <p id="statusText">-</p>
    </div>

    <p id="foodText"></p>
    <p id="timeText"></p>
  </div>

</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
